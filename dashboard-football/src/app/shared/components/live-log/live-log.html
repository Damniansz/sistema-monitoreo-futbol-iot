<div class="rounded-xl border border-slate-200 bg-white dark:border-slate-800 dark:bg-[#0d1222]/80 p-4 flex flex-col h-[400px] select-none transition-colors duration-200 shadow-sm dark:shadow-none">
  <div class="border-b border-slate-200 dark:border-slate-800 pb-2.5 mb-3 flex justify-between items-center bg-slate-50/20 dark:bg-transparent">
    <div>
      <h3 class="text-xs font-semibold text-slate-800 dark:text-slate-200">Eventos Recientes</h3>
      <p class="text-[10px] text-slate-500">Bitácora de conexión y alertas</p>
    </div>
    <span class="text-[9px] font-mono text-slate-450 dark:text-slate-500 bg-slate-100 dark:bg-slate-950 px-1.5 py-0.5 rounded border border-slate-200/50 dark:border-none">
      LIVE
    </span>
  </div>

  <div class="flex-1 overflow-y-auto space-y-2 pr-0.5 custom-scrollbar text-[11px]">
    @for (log of logs; track log.time + log.title) {
      <div class="p-2 border border-slate-100 bg-slate-50/30 dark:border-slate-800 dark:bg-slate-950/20 rounded-lg flex items-start gap-2.5">
        <!-- Colored Status Circle -->
        <span class="w-1.5 h-1.5 rounded-full mt-1 shrink-0"
              [class.bg-emerald-500]="log.tone === 'success'"
              [class.bg-amber-500]="log.tone === 'warning'"
              [class.bg-sky-500]="log.tone === 'info'">
        </span>
        <div class="flex-1 min-w-0">
          <div class="flex items-center justify-between gap-1">
            <strong class="font-semibold text-slate-800 dark:text-slate-200 truncate">{{ log.title }}</strong>
            <span class="font-mono text-[9px] text-slate-400 dark:text-slate-500">{{ log.time }}</span>
          </div>
          <p class="text-slate-600 dark:text-slate-400 mt-0.5 leading-normal">{{ log.detail }}</p>
        </div>
      </div>
    } @empty {
      <div class="flex flex-col items-center justify-center h-full text-slate-450 dark:text-slate-500 font-mono text-[10px] py-6">
        Esperando eventos del WebSocket...
      </div>
    }
  </div>
</div>
