<header class="bg-white border-b border-slate-200 dark:bg-[#0d1222] dark:border-slate-800/80 px-6 py-4 flex justify-between items-center text-slate-800 dark:text-slate-100 select-none transition-colors duration-200">
  <div class="flex items-center gap-3">
    <!-- Icon/Logo -->
    <div class="text-teal-500">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
      </svg>
    </div>
    <div>
      <h1 class="text-sm font-semibold tracking-wide text-slate-800 dark:text-slate-100">
        Fútbol Monitor
      </h1>
    </div>
  </div>

  <div class="flex items-center gap-4">
    <!-- Clock -->
    <div class="text-slate-500 dark:text-slate-400 font-mono text-xs">
      {{ currentTime() }}
    </div>

    <div class="h-4 w-px bg-slate-200 dark:bg-slate-800"></div>

    <!-- Theme Toggle Button -->
    <button (click)="themeService.toggleTheme()" 
            title="Cambiar tema"
            class="text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-slate-100 p-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors cursor-pointer active:scale-95">
      @if (themeService.theme() === 'dark') {
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707-.707M6.343 17.657l-.707-.707m12.728 0l-.707.707M6.343 6.343l-.707-.707m12.728 0A9 9 0 115.636 5.636 9 9 0 0117.657 5.657z" />
        </svg>
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
      }
    </button>
  </div>
</header>
