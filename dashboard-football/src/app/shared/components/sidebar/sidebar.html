<aside
  class="h-screen bg-slate-100/80 text-slate-600 w-60 flex flex-col justify-between p-5 border-r border-slate-200 dark:bg-[#0d1222] dark:text-slate-350 dark:border-slate-800 select-none transition-colors duration-200">
  <div>
    <!-- Logo area -->
    <div class="flex items-center gap-2 mb-8 px-2">
      <div class="text-slate-850 dark:text-slate-100">
        <svg class="h-6 w-6 fill-slate-800 dark:fill-white transition-colors" viewBox="0 0 512 512"
          xmlns="http://www.w3.org/2000/svg">
          <path
            d="M255.03 33.813c-1.834-.007-3.664-.007-5.5.03-6.73.14-13.462.605-20.155 1.344.333.166.544.32.47.438L204.78 75.063l73.907 49.437-.125.188 70.625.28L371 79.282 342.844 52c-15.866-6.796-32.493-11.776-49.47-14.78-12.65-2.24-25.497-3.36-38.343-3.407zM190.907 88.25l-73.656 36.78-13.813 98.407 51.344 33.657 94.345-43.438 14.875-76.5-73.094-48.906zm196.344.344l-21.25 44.5 36.75 72.72 62.063 38.905 11.312-21.282c.225.143.45.403.656.75-.77-4.954-1.71-9.893-2.81-14.782-6.446-28.59-18.59-55.962-35.5-79.97-9.07-12.872-19.526-24.778-31.095-35.5l-20.125-5.342zm-302.656 23c-6.906 8.045-13.257 16.56-18.938 25.5-15.676 24.664-26.44 52.494-31.437 81.312C31.783 232.446 30.714 246.73 31 261l20.25 5.094 33.03-40.5L98.75 122.53l-14.156-10.936zm312.719 112.844l-55.813 44.75-3.47 101.093 39.626 21.126 77.188-49.594 4.406-78.75-.094.157-61.844-38.783zm-140.844 6.406l-94.033 43.312-1.218 76.625 89.155 57.376 68.938-36.437 3.437-101.75-66.28-39.126zm-224.22 49.75c.91 8.436 2.29 16.816 4.156 25.094 6.445 28.59 18.62 55.96 35.532 79.968 3.873 5.5 8.02 10.805 12.374 15.938l-9.374-48.156.124-.032-27.03-68.844-15.782-3.968zm117.188 84.844l-51.532 8.156 10.125 52.094c8.577 7.49 17.707 14.332 27.314 20.437 14.612 9.287 30.332 16.88 46.687 22.594l62.626-13.69-4.344-31.124-90.875-58.47zm302.437.5l-64.22 41.25-42 47.375 4.408 6.156c12.027-5.545 23.57-12.144 34.406-19.72 23.97-16.76 44.604-38.304 60.28-62.97 2.51-3.947 4.87-7.99 7.125-12.092zm-122.78 97.656l-79.94 9.625-25.968 5.655c26.993 4 54.717 3.044 81.313-2.813 9.412-2.072 18.684-4.79 27.75-8.062l-3.156-4.406z" />
        </svg>
      </div>
      <h2 class="text-sm font-bold tracking-wider text-slate-800 dark:text-slate-100 uppercase">
        Futbol Monitor
      </h2>
    </div>

    <!-- Navigation links -->
    <nav class="space-y-1">
      <a routerLink="/dashboard"
        routerLinkActive="bg-white text-slate-900 border border-slate-200 shadow-sm font-semibold dark:bg-[#161f38] dark:text-teal-400 dark:border-transparent dark:shadow-none"
        [routerLinkActiveOptions]="{exact: true}"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-500 hover:text-slate-900 hover:bg-slate-200/50 dark:text-slate-400 dark:hover:text-slate-100 dark:hover:bg-slate-800/50 text-xs transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"
          stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2 2v-4zM14 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2v-4z" />
        </svg>
        <span>Dashboard</span>
      </a>

      @if (isStaff()) {
      <a routerLink="/session"
        routerLinkActive="bg-white text-slate-900 border border-slate-200 shadow-sm font-semibold dark:bg-[#161f38] dark:text-teal-400 dark:border-transparent dark:shadow-none"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-500 hover:text-slate-900 hover:bg-slate-200/50 dark:text-slate-400 dark:hover:text-slate-100 dark:hover:bg-slate-800/50 text-xs transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"
          stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
        </svg>
        <span>Sesión Activa</span>
      </a>
      }

      <a routerLink="/history"
        routerLinkActive="bg-white text-slate-900 border border-slate-200 shadow-sm font-semibold dark:bg-[#161f38] dark:text-teal-400 dark:border-transparent dark:shadow-none"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-500 hover:text-slate-900 hover:bg-slate-200/50 dark:text-slate-400 dark:hover:text-slate-100 dark:hover:bg-slate-800/50 text-xs transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"
          stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span>Historial</span>
      </a>
    </nav>
  </div>

  <!-- Logout / User profile area -->
  <div class="mt-auto border-t border-slate-200 dark:border-slate-800 pt-4 px-2">
    <div class="flex items-center gap-3 mb-4">
      <div
        class="w-8 h-8 rounded-full bg-slate-200 dark:bg-slate-800 flex items-center justify-center text-slate-600 dark:text-slate-300 font-bold text-xs uppercase shadow-sm border border-slate-300 dark:border-slate-700">
        {{ authService.currentUser()?.charAt(0) || 'U' }}
      </div>
      <div class="flex-1 overflow-hidden">
        <p class="text-xs font-bold text-slate-800 dark:text-slate-200 truncate">{{ authService.currentUser() ||
          'Usuario' }}</p>
        <p class="text-[9px] text-slate-500 dark:text-slate-400 font-mono tracking-wider">{{ authService.roles().join(',
          ') || 'GUEST' }}</p>
      </div>
    </div>

    <button (click)="logout()"
      class="flex items-center justify-center gap-2 w-full px-3 py-2 text-xs font-semibold text-red-600 dark:text-red-400 bg-red-50 hover:bg-red-100 dark:bg-red-500/10 dark:hover:bg-red-500/20 rounded-lg transition-colors cursor-pointer border border-transparent dark:border-red-500/20">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"
        stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
      </svg>
      Cerrar Sesión
    </button>
  </div>
</aside>
