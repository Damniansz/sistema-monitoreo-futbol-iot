<aside class="h-screen bg-slate-100/80 text-slate-600 w-60 flex flex-col justify-between p-5 border-r border-slate-200 dark:bg-[#0d1222] dark:text-slate-350 dark:border-slate-800 select-none transition-colors duration-200">
  <div>
    <!-- Logo area -->
    <div class="flex items-center gap-2 mb-8 px-2">
      <div class="text-slate-850 dark:text-slate-100">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10" />
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
          <path d="M2 12h20" />
        </svg>
      </div>
      <h2 class="text-sm font-bold tracking-wider text-slate-800 dark:text-slate-100 uppercase">
        Fútbol Monitor
      </h2>
    </div>

    <!-- Navigation links -->
    <nav class="space-y-1">
      <a routerLink="/dashboard" 
         routerLinkActive="bg-white text-slate-900 border border-slate-200 shadow-sm font-semibold dark:bg-[#161f38] dark:text-teal-400 dark:border-transparent dark:shadow-none" 
         [routerLinkActiveOptions]="{exact: true}"
         class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-500 hover:text-slate-900 hover:bg-slate-200/50 dark:text-slate-400 dark:hover:text-slate-100 dark:hover:bg-slate-800/50 text-xs transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2 2v-4zM14 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2v-4z" />
        </svg>
        <span>Dashboard</span>
      </a>

      <a routerLink="/session" 
         routerLinkActive="bg-white text-slate-900 border border-slate-200 shadow-sm font-semibold dark:bg-[#161f38] dark:text-teal-400 dark:border-transparent dark:shadow-none"
         class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-500 hover:text-slate-900 hover:bg-slate-200/50 dark:text-slate-400 dark:hover:text-slate-100 dark:hover:bg-slate-800/50 text-xs transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
        </svg>
        <span>Sesión Activa</span>
      </a>

      <a routerLink="/history" 
         routerLinkActive="bg-white text-slate-900 border border-slate-200 shadow-sm font-semibold dark:bg-[#161f38] dark:text-teal-400 dark:border-transparent dark:shadow-none"
         class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-500 hover:text-slate-900 hover:bg-slate-200/50 dark:text-slate-400 dark:hover:text-slate-100 dark:hover:bg-slate-800/50 text-xs transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span>Historial</span>
      </a>
    </nav>
  </div>
</aside>
