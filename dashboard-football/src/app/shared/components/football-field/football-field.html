<div class="relative w-full h-[400px] bg-[#143d25] rounded-2xl border border-slate-800 overflow-hidden shadow-md">

  <!-- Pitch markings (Thin white lines) -->
  <div class="absolute inset-4 border border-white/15 rounded pointer-events-none">
    
    <!-- Half-field line -->
    <div class="absolute left-1/2 top-0 bottom-0 border-l border-white/15 -translate-x-1/2"></div>
    
    <!-- Center Circle -->
    <div class="absolute left-1/2 top-1/2 w-20 h-20 border border-white/15 rounded-full -translate-x-1/2 -translate-y-1/2"></div>
    <div class="absolute left-1/2 top-1/2 w-1 h-1 bg-white/20 rounded-full -translate-x-1/2 -translate-y-1/2"></div>

    <!-- Left Penalty Area -->
    <div class="absolute left-0 top-1/2 -translate-y-1/2 w-16 h-40 border border-l-0 border-white/15">
      <!-- Penalty Spot -->
      <div class="absolute right-4 top-1/2 -translate-y-1/2 w-1 h-1 bg-white/20 rounded-full"></div>
    </div>

    <!-- Right Penalty Area -->
    <div class="absolute right-0 top-1/2 -translate-y-1/2 w-16 h-40 border border-r-0 border-white/15">
      <!-- Penalty Spot -->
      <div class="absolute left-4 top-1/2 -translate-y-1/2 w-1 h-1 bg-white/20 rounded-full"></div>
    </div>
    
    <!-- Corner Arcs -->
    <div class="absolute left-0 top-0 w-3 h-3 border-r border-b border-white/10 rounded-br-full"></div>
    <div class="absolute left-0 bottom-0 w-3 h-3 border-r border-t border-white/10 rounded-tr-full"></div>
    <div class="absolute right-0 top-0 w-3 h-3 border-l border-b border-white/10 rounded-bl-full"></div>
    <div class="absolute right-0 bottom-0 w-3 h-3 border-l border-t border-white/10 rounded-tl-full"></div>

  </div>

  <!-- Tactical Connectivity/Compactness Mesh -->
  <svg class="absolute inset-0 w-full h-full pointer-events-none z-0">
    @if (showConnectionLines) {
      @for (line of connections; track $index) {
        <line [attr.x1]="line.x1 + '%'" 
              [attr.y1]="line.y1 + '%'" 
              [attr.x2]="line.x2 + '%'" 
              [attr.y2]="line.y2 + '%'" 
              [class]="line.colorClass" 
              stroke-width="1.2" 
              stroke-dasharray="3,3" />
      }
    }
  </svg>

  <!-- Player Markers -->
  @for (player of players; track player.player) {
    <div class="absolute transition-all duration-[400ms] ease-out -translate-x-1/2 -translate-y-1/2 group"
         [style.left.%]="4 + (player.x / 100) * 92"
         [style.top.%]="4 + (player.y / 60) * 92">

      <!-- Simple Solid Dot -->
      <div class="relative flex items-center justify-center w-7 h-7 rounded-full bg-slate-950 border text-white cursor-pointer shadow transition-transform group-hover:scale-110 z-10"
           [class.border-emerald-500]="player.status === 'Activo'"
           [class.border-amber-500]="player.status === 'Reposo'"
           [class.border-slate-650]="player.status === 'offline'">
        
        <span class="text-[9px] font-mono font-bold"
              [class.text-emerald-400]="player.status === 'Activo'"
              [class.text-amber-400]="player.status === 'Reposo'"
              [class.text-slate-400]="player.status === 'offline'">
          {{ getPlayerInitials(player.player) }}
        </span>
      </div>

      <!-- Simple Name Tag Below Dot -->
      <div class="absolute left-1/2 -translate-x-1/2 mt-1 whitespace-nowrap bg-slate-900 border border-slate-800 text-[9px] text-slate-400 px-1.5 py-0.5 rounded shadow-sm pointer-events-none">
        {{ player.player }}
      </div>

      <!-- Hover Tooltip -->
      <div class="absolute left-1/2 -translate-x-1/2 bottom-full mb-2.5 hidden group-hover:block w-32 bg-slate-900 border border-slate-800 p-2 rounded shadow-lg z-50 pointer-events-none text-[10px]">
        <p class="font-semibold text-slate-250 mb-1 border-b border-slate-800 pb-0.5">{{ player.player }}</p>
        <div class="space-y-0.5 font-mono">
          <div class="flex justify-between">
            <span class="text-slate-500">Velocidad:</span>
            <span class="text-teal-400 font-semibold">{{ player.speed.toFixed(1) }} km/h</span>
          </div>
          <div class="flex justify-between">
            <span class="text-slate-500">Distancia:</span>
            <span class="text-slate-350">{{ player.distance.toFixed(0) }} m</span>
          </div>
          <div class="flex justify-between">
            <span class="text-slate-500">Estado:</span>
            <span [class.text-emerald-400]="player.status === 'Activo'"
                  [class.text-amber-400]="player.status === 'Reposo'">
              {{ player.status }}
            </span>
          </div>
        </div>
      </div>

    </div>
  }
  
</div>
